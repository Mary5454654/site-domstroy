{% extends "base.html" %}

{% block content %}
<section class="page-head">
    <div class="container">
        <h1>Статьи</h1>
        <p>Полезные материалы о строительстве и выборе проекта.</p>
    </div>
</section>

<section class="section">
    <div class="container article-grid">
        {% for article in articles %}
            <article class="article-card">
                <p class="tag">{{ article.category }}</p>
                <h2><a href="{{ url_for('main.article_detail', slug=article.slug) }}">{{ article.title }}</a></h2>
                <p>{{ article.summary }}</p>
                <a class="read-more" href="{{ url_for('main.article_detail', slug=article.slug) }}">Читать</a>
            </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
