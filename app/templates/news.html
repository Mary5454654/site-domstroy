{% extends "base.html" %}

{% block content %}
<section class="page-head">
    <div class="container">
        <h1>Новости</h1>
        <p>Обновления компании и полезные заметки для клиентов.</p>
    </div>
</section>

<section class="section">
    <div class="container news-list">
        {% for item in news %}
            <article>
                <time>{{ item.date }}</time>
                <h2>{{ item.title }}</h2>
                <p>{{ item.text }}</p>
            </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
