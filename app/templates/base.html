<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | ДомСтрой</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="logo" href="{{ url_for('main.index') }}">ДомСтрой</a>
            <nav class="main-nav" aria-label="Главное меню">
                {% for item in site_pages %}
                    <a href="{{ url_for(item.endpoint) }}">{{ item.title }}</a>
                {% endfor %}
            </nav>
            <button class="access-toggle" type="button" data-access-toggle>Версия для слабовидящих</button>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>ДомСтрой, учебный сайт о строительстве частных домов.</p>
            <a href="{{ url_for('main.sitemap') }}">Карта сайта</a>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
